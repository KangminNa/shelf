version: '3.8'

services:
  shelf:
    build: .
    container_name: shelf
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
      - "9100:9100"
    volumes:
      - ./data:/app/data
      - ./plugins:/app/plugins
      - ssl-certs:/app/data/ssl
    environment:
      - PORT=81
      - NODE_ENV=production
      - PROXY_HTTP_PORT=80
      - PROXY_HTTPS_PORT=443
      - WEBHOOK_PORT=9100
    env_file:
      - .env

volumes:
  ssl-certs:
